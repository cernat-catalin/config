<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#13151f"/>
  <!-- Subtle border -->
  <rect width="64" height="64" rx="12" fill="none" stroke="#252836" stroke-width="1.5"/>
  <!-- Terminal prompt ">" -->
  <text x="10" y="36" font-family="monospace" font-size="20" font-weight="700" fill="#60a5fa">&#x3E;_</text>
  <!-- "CC" monogram bottom-right -->
  <text x="36" y="56" font-family="monospace" font-size="13" font-weight="700" fill="#3d4255">CC</text>
  <!-- Accent dot -->
  <circle cx="54" cy="12" r="4" fill="#60a5fa" opacity="0.7"/>
</svg>
