general.import = [ "~/.config/omarchy/current/theme/alacritty.toml" ]

[env]
TERM = "xterm-256color"

[font]
normal = { family = "CaskaydiaMono Nerd Font", style = "Regular" }
bold = { family = "CaskaydiaMono Nerd Font", style = "Bold" }
italic = { family = "CaskaydiaMono Nerd Font", style = "Italic" }
size = 9

[window]
padding.x = 14
padding.y = 14
decorations = "None"

[keyboard]
bindings = [
{ key = "F11", action = "ToggleFullscreen" },
{ key = "Insert", mods = "Shift", action = "Paste" },
{ key = "Insert", mods = "Control", action = "Copy" },
  { key = "Return", mods = "Shift", chars = "\u001B\r" },
  # tmux extended-keys uses XTerm modifyOtherKeys; Alacritty only supports the
  # kitty keyboard protocol, so C-Tab is indistinguishable from Tab without this.
  # \e[27;5;9~ = modifyOtherKeys format: modifier 5 (Ctrl), keycode 9 (Tab).
  { key = "Tab", mods = "Control", chars = "\u001b[27;5;9~" }
]

[terminal]
osc52 = "CopyPaste"
